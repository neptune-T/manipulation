debug: True
SAVE_VIDEO: False
SAVE_RENDER: True
INFERENCE_GSAM: False
USE_CUROBO: False
USE_GRASPNET: False
HEADLESS: False
SAVE_ROOT: "output/gym_test"
USE_ARTI: True
USE_SUDOAI: False
RANDOM_TASK: True
WITH_ROTATION: False
GEN_TASK: True
USE_3D: True
USE_MESH_COLLISION: False

# --- Optional: add a SMPL-X humanoid to the same scene (for HOI feasibility demos) ---
USE_HUMANOID: False
# When using humanoid IK as the manipulator, disable the Franka arm.
USE_FRANKA: False
humanoid:
  # PHC root so we can import SMPLSim (`smpl_sim`) without installing it as a package.
  phc_root: "/home/plote/hoi/PHC"
  # SMPL/SMPL-X model directory. You likely need to create this and place SMPL-X npz files under it.
  # SMPLSim expects structure like: <smpl_data_dir>/smplx/SMPLX_NEUTRAL.npz (etc).
  # If you already have SMPL-X models elsewhere, point this to that folder.
  # Using a relative path will be resolved against humanoid.phc_root.
  smpl_data_dir: "data/smpl"
  mjcf_tmp_dir: "/tmp/smpl"
  model: "smplx"
  # Initial pose of the humanoid in the GAPartNet scene
  pose_p: [0.2, 0.0, 0.9]
  pose_r: [0.0, 0.0, 0.0, 1.0]
  # Auto place the humanoid in front of the articulated object.
  auto_place: True
  # Offsets relative to articulated object root (front is -X in GAPartNet scenes)
  front_offset: 0.8
  lateral_offset: 0.0
  height_offset: 0.9
  # Enable Jacobian IK to drive humanoid hand for manipulation
  ik_control: True
  ik_ee_body: "R_Wrist"
  ik_dof_names: ["R_Shoulder", "R_Elbow", "R_Wrist"]
  # Auto-stand: lift humanoid so feet are on the ground
  auto_stand: True
  stand_eps: 0.01
  # Force upright root rotation (fixes lying-down axis mismatch)
  auto_upright: True
  upright_rot_x_deg: 90.0
  # Keep the humanoid standing by locking lower body DOFs.
  lock_lower_body: True
  lower_body_dof_names: ["Pelvis", "L_Hip", "L_Knee", "L_Ankle", "L_Toe", "R_Hip", "R_Knee", "R_Ankle", "R_Toe"]
  lock_stiffness: 2000.0
  lock_damping: 100.0
  # Hold a cached standing pose for non-IK DOFs (prevents collapsing)
  hold_stand_pose: True
  # Human-like pull parameters (meters / steps)
  pregrasp_offset: 0.25
  grasp_offset: 0.12
  approach_steps: 8
  pull_steps: 35
  pull_delta: 0.008
  # IK stabilization
  ik_pos_gain: 1.0
  ik_rot_gain: 0.5
  ik_max_dq: 0.08
  # Finger control
  finger_open_pos: 0.0
  finger_close_pos: 0.7
  # Contact tuning (reduce penetration)
  contact_offset: 0.02
  thickness: 0.02
  friction: 2.0
  # For a first visual demo, fixing the base prevents immediate falling.
  fix_base_link: True
  # Simple PD hold (only used if drive_mode is "pos")
  drive_mode: "pos"   # "none" | "pos"
  stiffness: 300.0
  damping: 10.0
dataset: 
  - "ycb"
  - "objaverse"

SEED: 42
steps: 1000
num_envs: 1
env_spacing: 1.0
controller: ik

# cam
cam:
  use_cam: True
  cam_w: 2160 # 1080
  cam_h: 1440 # 720
  cam_far_plane: 100
  cam_near_plane: 0.05
  cam_horizontal_fov: 60 # pixel
  cam_poss: # small table
    - [0.5, 0.7, 1.2]
    - [0, 0, 1.2]
    - [1, 0, 1.2]
    - [0.5, -0.7, 1]
  cam_targets: 
    - [0.5, 0, 0.5]
    - [0.5, 0, 0.15]
    - [0.5, 0, 0.15]
    - [0.5, 0, 0.3]
  # cam_poss: # large table
  #   - [1.2, 0, 1.8]
  #   - [0.4, 1.2, 1]
  #   - [0.4, -1.2, 1]
  #   - [-0.4, 0, 1.8]
  # cam_targets: 
  #   - [0.4, 0, 0.15]
  #   - [0.4, 0.2, 0.3]
  #   - [0.4, -0.2, 0.3]
  #   - [0.4, 0, 0.15]
  point_cloud_bound:
    - [-1, 1]
    - [-1, 1]
    - [0.1, 1.0]
  sampling_method: random_fps # random_fps, random, fps
  sampling_num: 20000

asset:
  # asset
  asset_root: assets
  asset_files: 
    - urdf/ycb/025_mug/025_mug.urdf
    - urdf/ycb/010_potted_meat_can/010_potted_meat_can.urdf
    - urdf/ycb/011_banana/011_banana.urdf
  obj_pose_ps: # small table
    - [0.5, 0, 0.4]
    - [0.5, 0, 0.4]
    - [0.5, 0, 0.4]
  position_noise: [0.2, 0.25] # meter # small table
  # position_noise: [0.15, 0.2] # meter
  rotation_noise: 15 # degree
  asset_seg_ids: 
    - 2
    - 3
    - 4
  obj_scale: 0.8

  # articulated asset
  arti_obj_root: gapartnet
  arti_gapartnet_ids: 
    - 45135 #46856 #45780 #45594
  arti_obj_pose_ps: 
    - [0.4, -0.6, 0.6]
  arti_position_noise: 0.1 # meter
  arti_rotation_noise: 15 # degree
  arti_obj_scale: 0.4
  arti_rotation: -40

  # table_pose_p: [0.4, 0, 0.5]
  # table_scale: [1.2, 2, 0.3]

  table_pose_p: [0.7, 0, 0.01]
  table_scale: [1.2, 2, 0.02]
  table_seg_id: 0

  # robot
  franka_asset_file: urdf/franka_description/robots/franka_panda.urdf
  franka_pose_p: [0, 0, 0]
  franka_seg_id: 1

gsam:
  # GroundedSAM
  box_threshold: 0.3
  text_threshold: 0.25
  text_prompt:  "banana"
  device: "cuda"
  sam_version: "vit_h"
  sam_checkpoint: "assets/ckpts/sam_vit_h_4b8939.pth"
  grounded_checkpoint: "assets/ckpts/groundingdino_swint_ogc.pth"
  config: "../vision/GroundedSAM/GroundingDINO/groundingdino/config/GroundingDINO_SwinT_OGC.py"

graspnet:
  save_files: False
  dataset_root: ""
  checkpoint_path: gym/graspness_implementation/ckpt/minkuresunet_kinect.tar
  dump_dir: ./logs/
  seed_feat_dim: 512
  camera: kinect
  num_point: 15000
  batch_size: 1
  voxel_size: 0.005
  collision_thresh: 0.00001
  voxel_size_cd: 0.01
  infer: True
  vis: True

